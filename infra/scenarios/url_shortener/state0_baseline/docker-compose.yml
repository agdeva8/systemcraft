version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ../../../shared/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c listen_addresses=*
      -c max_connections=20
      -c shared_buffers=32MB
      -c effective_cache_size=128MB
      -c work_mem=2MB
      -c maintenance_work_mem=16MB
      -c log_min_duration_statement=100
      -c log_connections=on
      -c log_disconnections=on
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  app:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../app:/app
    command: >
      sh -c "pip install fastapi uvicorn psycopg2-binary redis prometheus-client -q &&
             uvicorn main:app --host 0.0.0.0 --port 8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/urlshortener
      DB_POOL_SIZE: "18"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../../../prometheus/scrape_config.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=1h
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

